<div class="sidebar-section">
  <h3 class="sidebar-title">标签云</h3>
  <div class="tags-cloud">
    {% assign tags = site.tags | sort %}
    {% for tag in tags %}
      {% assign tag_name = tag | first %}
      {% assign slug = tag_name | downcase | replace: '.', '' | replace: ' ', '-' | replace: '#', '' %}
      <a href="{{ site.baseurl }}/tags/#{{ slug }}" class="tag-item">
        {{ tag_name }}
        <span class="tag-count">{{ tag | last | size }}</span>
      </a>
    {% endfor %}
  </div>
</div>
