<div class="sidebar-section">
  <h3 class="sidebar-title">标签云</h3>
  <div class="tags-cloud">
    {% assign tags = site.tags | sort %}
    {% for tag in tags %}
      <a href="{{ site.baseurl }}/tags/#{{ tag | first | slugize }}" class="tag-item">
        {{ tag | first }}
        <span class="tag-count">{{ tag | last | size }}</span>
      </a>
    {% endfor %}
  </div>
</div>
