<div class="post-meta">
  <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
  {% assign words = page.content | strip_html | split: ' ' | size %}
  {% assign reading_time = words | divided_by: 200 | at_least: 1 %}
  <span class="post-reading-time">约 {{ reading_time }} 分钟阅读</span>
  {% if page.last_modified_at %}
  <span class="post-updated">更新于 {{ page.last_modified_at | date: "%Y-%m-%d" }}</span>
  {% endif %}
</div>
