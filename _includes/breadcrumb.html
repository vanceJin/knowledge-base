<nav class="breadcrumb">
  <a href="{{ site.baseurl }}/">首页</a>
  <span class="separator">/</span>
  {% if page.layout == 'category' %}
    <a href="{{ site.baseurl }}/categories/">分类</a>
    <span class="separator">/</span>
    <span>{{ page.title }}</span>
  {% elsif page.categories %}
    {% for category in page.categories %}
      {% unless forloop.last %}
        <a href="{{ site.baseurl }}/categories/{{ category | downcase | replace: '.', '' | slugize }}/">{{ category }}</a>
        <span class="separator">/</span>
      {% else %}
        <span>{{ category }}</span>
      {% endunless %}
    {% endfor %}
  {% else %}
    <span>未分类</span>
  {% endif %}
</nav>
