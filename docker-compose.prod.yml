# Jekyll 知识库 Docker Compose 配置 - 生产版

services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    
    ports:
      - "8080:8080"
    
    volumes:
      - bundle:/srv/jekyll/vendor/bundle
      - jekyll_data:/srv/jekyll
      
    environment:
      - JEKYLL_ENV=production
      - TZ=Asia/Shanghai
    
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - jekyll_data:/usr/share/nginx/html:ro
    depends_on:
      - jekyll
    restart: unless-stopped

volumes:
  bundle:
  jekyll_data:
