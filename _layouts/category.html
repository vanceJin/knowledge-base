---
layout: default
---

{% if site.categories[page.title] %}
  <div class="category-posts">
    {% for post in site.categories[page.title] %}
      <article class="post-item">
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        {% include post-meta-list.html %}
      </article>
    {% endfor %}
  </div>
{% else %}
  <p>该分类下暂无文章。</p>
{% endif %}
