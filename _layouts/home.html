<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | default: '我的知识管理平台' }}">
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/design-system.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/nav-optimization.css' | relative_url }}">
  </head>
  <body>
    <div class="container">
      <h1>{{ page.title | escape }}</h1>
      {{ content }}
    </div>
  </body>
</html>
